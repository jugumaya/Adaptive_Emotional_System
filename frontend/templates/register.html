<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AEE — Register</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,500;1,400&display=swap');
:root{--bg:#0a0d16;--surface:#0f1420;--card:#141928;--border:#1e2a42;--accent:#5b8ef0;--accent2:#7c6ff7;--green:#22d3a5;--red:#f06060;--text:#e2e8f8;--muted:#4a5680;--muted2:#7a88b0;--font:'Inter',sans-serif;--serif:'Playfair Display',serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 60% at 25% 35%,rgba(91,142,240,.07) 0%,transparent 60%);pointer-events:none}
.page{position:relative;z-index:1;width:500px;background:var(--card);border:1px solid var(--border);border-radius:22px;padding:46px 48px;animation:rise .5s ease both}
@keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:30px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-text{font-size:1rem;font-weight:600}
.logo-sub{font-size:.65rem;color:var(--muted);margin-top:1px}
h2{font-family:var(--serif);font-size:1.55rem;margin-bottom:4px}
.sub{font-size:.83rem;color:var(--muted2);margin-bottom:26px}
.role-bar{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;background:var(--surface);padding:4px;border-radius:11px;border:1px solid var(--border);margin-bottom:22px}
.rtab{padding:7px 2px;text-align:center;border-radius:8px;cursor:pointer;font-size:.65rem;font-weight:500;color:var(--muted);border:none;background:none;font-family:var(--font);transition:all .18s}
.rtab:hover{color:var(--text)}
.rtab.on{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{margin-bottom:14px}
.field label{display:block;font-size:.72rem;color:var(--muted2);margin-bottom:6px}
.field input,.field select{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:10px 13px;font-family:var(--font);font-size:.88rem;color:var(--text);outline:none;transition:border-color .2s}
.field input:focus,.field select:focus{border-color:var(--accent)}
.field input::placeholder{color:var(--muted)}
.field select option{background:var(--card)}
.btn{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:9px;padding:12px;font-family:var(--font);font-size:.9rem;font-weight:600;cursor:pointer;margin-top:6px;transition:all .2s}
.btn:hover{opacity:.9;transform:translateY(-1px)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.err-msg{font-size:.76rem;color:var(--red);margin-bottom:10px;display:none;padding:8px 12px;background:rgba(240,96,96,.08);border:1px solid rgba(240,96,96,.2);border-radius:7px}
.foot{font-size:.78rem;color:var(--muted2);text-align:center;margin-top:16px}
.foot a{color:var(--accent);text-decoration:none}
.foot a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="page">
  <div class="logo">
    <div class="logo-icon">🧠</div>
    <div><div class="logo-text">AEE Platform</div><div class="logo-sub">CSE307 · IUB · Group 05</div></div>
  </div>
  <h2>Create account</h2>
  <p class="sub">Join the Adaptive Emotional Ecosystem</p>

  <div class="role-bar">
    <button class="rtab on"  onclick="setRole('student',this)">Student</button>
    <button class="rtab"     onclick="setRole('counselor',this)">Counselor</button>
    <button class="rtab"     onclick="setRole('advisor',this)">Advisor</button>
    <button class="rtab"     onclick="setRole('admin',this)">Admin</button>
    <button class="rtab"     onclick="setRole('management',this)">Uni Mgmt</button>
  </div>

  <div class="g2">
    <div class="field"><label>Full name</label><input type="text" id="nameIn" placeholder="Your name"></div>
    <div class="field">
      <label>Department</label>
      <select id="deptIn">
        <option value="">— select —</option>
        <option>CSE</option><option>EEE</option><option>BBA</option>
        <option>English</option><option>Law</option><option>Architecture</option><option>Other</option>
      </select>
    </div>
  </div>
  <div class="field"><label>Email address</label><input type="email" id="emailIn" placeholder="you@iub.edu.bd"></div>
  <div class="g2">
    <div class="field"><label>Password</label><input type="password" id="passIn" placeholder="Min 6 characters"></div>
    <div class="field"><label>Confirm password</label><input type="password" id="confirmIn" placeholder="Repeat"></div>
  </div>

  <div class="err-msg" id="errMsg"></div>
  <button class="btn" id="regBtn" onclick="doRegister()">Create account →</button>
  <p class="foot">Already have an account? <a href="/ui/login">Sign in</a></p>
</div>

<script>
const API = 'http://localhost:8000';
let role = 'student';

function setRole(r, btn) {
  role = r;
  document.querySelectorAll('.rtab').forEach(t => t.classList.remove('on'));
  btn.classList.add('on');
}

async function doRegister() {
  const name    = document.getElementById('nameIn').value.trim();
  const email   = document.getElementById('emailIn').value.trim();
  const pass    = document.getElementById('passIn').value;
  const confirm = document.getElementById('confirmIn').value;
  const dept    = document.getElementById('deptIn').value;
  const btn     = document.getElementById('regBtn');
  document.getElementById('errMsg').style.display = 'none';

  if (!email || !pass)  { showErr('Email and password are required.'); return; }
  if (pass.length < 6)  { showErr('Password must be at least 6 characters.'); return; }
  if (pass !== confirm) { showErr('Passwords do not match.'); return; }

  btn.disabled = true; btn.textContent = 'Creating account…';
  try {
    const res  = await fetch(API + '/auth/register', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ name, email, password:pass, role, department:dept })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Registration failed.');

    localStorage.setItem('aee_token',   data.access_token);
    localStorage.setItem('aee_role',    data.role);
    localStorage.setItem('aee_user_id', data.user_id);
    localStorage.setItem('aee_anon_id', data.anonymous_id);
    localStorage.setItem('aee_name',    data.name  || '');
    localStorage.setItem('aee_email',   data.email || '');

    const map = { student:'student', counselor:'counselor', advisor:'counselor',
                  admin:'admin', management:'management' };
    window.location.href = `/ui/dashboard/${map[data.role] || 'student'}`;
  } catch(e) {
    showErr(e.message);
    btn.disabled = false; btn.textContent = 'Create account →';
  }
}

function showErr(m) {
  const el = document.getElementById('errMsg');
  el.textContent = m; el.style.display = 'block';
}
</script>
</body>
</html>
